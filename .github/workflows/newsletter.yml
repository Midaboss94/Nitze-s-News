name: Nitze's News
 
on:
  schedule:
    # Runs at 8:00 AM Eastern every day (UTC-4 in summer, UTC-5 in winter)
    # Adjust the hour if you want a different time:
    #   12:00 UTC = 8:00 AM ET (summer)  ← current setting
    #   13:00 UTC = 8:00 AM ET (winter)
    - cron: "0 12 * * *"
 
  # Lets you trigger it manually from the GitHub website to test it
  workflow_dispatch:
 
jobs:
  send-newsletter:
    runs-on: ubuntu-latest
 
    steps:
      - name: Check out repo
        uses: actions/checkout@v4
 
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
 
      - name: Install dependencies
        run: pip install requests
 
      - name: Run newsletter script
        env:
          NEWS_API_KEY:   ${{ secrets.NEWS_API_KEY }}
          GMAIL_ADDRESS:  ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASS }}
        run: python newsletter.py
